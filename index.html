<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>reklam online</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* KATEGORİ */
.category{
    margin-top:10px;
}

.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

/* ALT KUTU */
.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.submenu div{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.submenu div:hover{
    background:green;
}

/* UPLOAD BOX (YENİ EKLENDİ AMA TASARIM BOZMADI) */
.upload-box{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px dashed #444;
    font-size:13px;
}

.upload-box input{
    width:100%;
    color:white;
}

/* VIDEO */
video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<body>

<header class="topbar">
    <div class="title">📺reklam online DİJİTAL REKLAM</div>
    <div class="action" onclick="reklamVer()">📢 Reklam Ver / WhatsApp</div>
</header>

<div class="container">

<div class="menu">

<h3>📂 Kategoriler</h3>

<!-- TREND -->
<div class="category">
<button onclick="toggleMenu(this)">🛍 TREND ÜRÜNLER</button>
<div class="submenu">

<div class="upload-box">
<input type="file" accept="video/*" onchange="uploadVideo(event,'trend')">
</div>

<div onclick="playSingle('trend',0)">🔥 Trend Reklam 1</div>

</div>
</div>

<!-- ARABA -->
<div class="category">
<button onclick="toggleMenu(this)">🚗 OTOMOBİL ALIM-SATIM</button>
<div class="submenu">

<div class="upload-box">
<input type="file" accept="video/*" onchange="uploadVideo(event,'araba')">
</div>

<div onclick="playSingle('araba',0)">🚗 Araba Reklam 1</div>

</div>
</div>

<!-- TEKNOLOJİ -->
<div class="category">
<button onclick="toggleMenu(this)">📱 TEKNOLOJİ ÜRÜNLERİ</button>
<div class="submenu">

<div class="upload-box">
<input type="file" accept="video/*" onchange="uploadVideo(event,'teknoloji')">
</div>

</div>
</div>

<!-- YEREL -->
<div class="category">
<button onclick="toggleMenu(this)">🏪 YEREL FİRMA İLANLARI</button>
<div class="submenu">

<div class="upload-box">
<input type="file" accept="video/*" onchange="uploadVideo(event,'yerel')">
</div>

<div onclick="playSingle('yerel',0)">🏪 Firma 1</div>

</div>
</div>

<!-- MÜZİK -->
<div class="category">
<button onclick="toggleMenu(this)">🎵 MÜZİK PİYASASI</button>
<div class="submenu">

<div class="upload-box">
<input type="file" accept="video/*" onchange="uploadVideo(event,'muzik')">
</div>

<div onclick="playSingle('muzik',0)">🎵 Klip 1</div>

</div>
</div>

<!-- (DİĞER KATEGORİLER AYNI MANTIKTA DEVAM EDER) -->

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" autoplay muted controls></video>
</div>

</div>

<script>

let ads = {
    trend: [],
    araba: [],
    teknoloji: [],
    yerel: [],
    muzik: []
};

let currentCategory = "trend";
let index = 0;

/* MENU */
function toggleMenu(btn){
    let menu = btn.nextElementSibling;
    menu.style.maxHeight = menu.style.maxHeight ? null : menu.scrollHeight + "px";
}

/* VIDEO UPLOAD */
function uploadVideo(event, cat){
    let file = event.target.files[0];
    if(!file) return;

    let url = URL.createObjectURL(file);

    ads[cat].push(url);

    currentCategory = cat;
    index = ads[cat].length - 1;

    play();
}

/* PLAY */
function play(){
    let video = document.getElementById("player");
    let list = ads[currentCategory];

    if(!list || list.length === 0) return;

    video.src = list[index];
    video.play();
}

/* SEÇ */
function playSingle(cat,i){
    currentCategory = cat;
    index = i;
    play();
}

/* WHATSAPP */
function reklamVer(){
    let mesaj = `Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;

    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(mesaj));
}

</script>

</body>
</html>
