<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:18px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* MENU */
.menu{
    width:30%;
    background:#1a1a1a;
    overflow-y:auto;
    padding:10px;
    box-sizing:border-box;
}

.category{
    border:1px solid #333;
    margin-bottom:10px;
    border-radius:8px;
    overflow:hidden;
}

.category h3{
    margin:0;
    padding:12px;
    background:#222;
    cursor:pointer;
    font-size:14px;
}

.track-list{
    display:none;
    padding:10px;
}

.track-list div{
    padding:8px;
    margin-bottom:6px;
    background:#333;
    cursor:pointer;
    border-radius:5px;
}

.track-list div:hover{
    background:red;
}

/* SCREEN */
.screen{
    width:70%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
    <div class="title">📺 DİJİTAL REKLAM TV</div>
    <div class="action" onclick="reklamVer()">📢 Reklam Ver</div>
</div>

<div class="container">

<!-- MENU -->
<div class="menu">

<div class="category">
<h3 onclick="toggleList('yeniyayinlar')">🆕 Yeni Yayınlar</h3>

<div class="track-list" id="yeniyayinlar">

    <div onclick="playTrack('Ben Kalırım Yeni','BEN.KALIRIM.YENİ.mp3')">
        🎵 BEN KALIRIM (YENİ)
    </div>

    <div onclick="playTrack('Belalı Yarim','belali_yarim_video.mp4')">
        🎬 BELALI YARİM
    </div>

</div>
</div>

<div class="category">
<h3 onclick="toggleList('araba')">🚗 Otomobil</h3>
<div class="track-list" id="araba">
    <div onclick="playTrack('Araba Reklam','https://www.w3schools.com/html/mov_bbb.mp4')">
        🚗 Araba Tanıtım
    </div>
</div>
</div>

<div class="category">
<h3 onclick="toggleList('teknoloji')">📱 Teknoloji</h3>
<div class="track-list" id="teknoloji">
    <div onclick="playTrack('Telefon','https://www.w3schools.com/html/movie.mp4')">
        📱 Telefon Reklam
    </div>
</div>
</div>

<div class="category">
<h3 onclick="toggleList('trend')">🛍 Trend Ürünler</h3>
<div class="track-list" id="trend">
    <div onclick="playTrack('Trend','https://www.w3schools.com/html/movie.mp4')">
        🛍 Trend Ürün
    </div>
</div>
</div>

<div class="category">
<h3 onclick="toggleList('muzik')">🎵 Müzik</h3>
<div class="track-list" id="muzik">
    <div onclick="playTrack('Müzik Klip','https://www.w3schools.com/html/movie.mp4')">
        🎵 Klip
    </div>
</div>
</div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" controls autoplay></video>
</div>

</div>

<script>

function toggleList(id){
    let el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

function playTrack(name,file){
    let v = document.getElementById("player");
    v.src = file;
    v.play();
}

function reklamVer(){
    window.open("https://wa.me/905074163605?text=Reklam%20vermek%20istiyorum","_blank");
}

</script>

</body>
</html>
