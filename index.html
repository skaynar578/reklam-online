<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>reklam online</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

.category{
    margin-top:10px;
}

.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.submenu div{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

.submenu div:hover{
    background:green;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="title">📺 REKLAM ONLINE DİJİTAL REKLAM</div>
    <div class="action" onclick="reklamVer()">📢 Reklam Ver</div>
</div>

<div class="container">

<div class="menu">

<h3>📂 Kategoriler</h3>

<div class="category">
<button onclick="toggleMenu(this); loadCategory('araba')">🚗 OTOMOBİL</button>
<div class="submenu"></div>
</div>

<div class="category">
<button onclick="toggleMenu(this); loadCategory('teknoloji')">📱 TEKNOLOJİ</button>
<div class="submenu"></div>
</div>

<div class="category">
<button onclick="toggleMenu(this); loadCategory('muzik')">🎵 MÜZİK</button>
<div class="submenu"></div>
</div>

<div class="category">
<button onclick="toggleMenu(this); loadCategory('trend')">🛍 TREND</button>
<div class="submenu"></div>
</div>

<div class="category">
<button onclick="toggleMenu(this); loadCategory('yerel')">🏪 YEREL</button>
<div class="submenu"></div>
</div>

</div>

<div class="screen">
    <video id="player" autoplay muted controls></video>
</div>

</div>

<script>

let currentCategory = "araba";
let adsList = [];
let index = 0;

/* ======================
   MENÜ AÇ/KAPAT
====================== */
function toggleMenu(btn){
    let menu = btn.nextElementSibling;

    if(menu.style.maxHeight){
        menu.style.maxHeight = null;
    } else {
        menu.style.maxHeight = menu.scrollHeight + "px";
    }
}

/* ======================
   BACKEND'DEN VERİ ÇEK
====================== */
async function loadCategory(cat){

    currentCategory = cat;

    let res = await fetch("http://localhost:3000/ads/" + cat);
    let data = await res.json();

    adsList = data;
    index = 0;

    renderMenu(data);
    play();
}

/* ======================
   MENÜYE YAZ
====================== */
function renderMenu(data){

    document.querySelectorAll(".submenu").forEach(m=>{
        m.innerHTML = "";
    });

    if(data.length === 0){
        return;
    }

    let container = document.querySelector(".category.open .submenu");

    if(!container) return;

    data.forEach((ad,i)=>{
        let div = document.createElement("div");
        div.innerText = ad.title;
        div.onclick = ()=> playIndex(i);
        container.appendChild(div);
    });
}

/* ======================
   VİDEO OYNAT
====================== */
function play(){

    if(!adsList.length) return;

    let video = document.getElementById("player");

    video.src = "http://localhost:3000/videos/" + adsList[index].videoUrl;
    video.play();

    video.onended = ()=>{
        index++;
        if(index >= adsList.length) index = 0;
        play();
    };
}

/* ======================
   TEK SEÇİM
====================== */
function playIndex(i){
    index = i;
    play();
}

/* ======================
   WHATSAPP
====================== */
function reklamVer(){
    window.open("https://wa.me/905074163605","_blank");
}

/* ======================
   BAŞLAT
====================== */
loadCategory("araba");

</script>

</body>
</html>
