<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* KATEGORİ */
.category{
    margin-top:10px;
}

.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

/* ALT KUTULAR */
.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.submenu div{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.submenu div:hover{
    background:green;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<script>

/* MENU */
function toggleMenu(btn){
    let menu = btn.nextElementSibling;
    menu.style.maxHeight = menu.style.maxHeight ? null : menu.scrollHeight + "px";
}

let ads = {
    trend:["https://www.w3schools.com/html/movie.mp4","https://www.w3schools.com/html/movie.mp4"],
    araba:["https://www.w3schools.com/html/movie.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    yerel:["https://www.w3schools.com/html/movie.mp4"],

    muzik:[
        "https://www.w3schools.com/html/movie.mp4",
        "belali_yarim_video.mp4.mp4"
    ],

    mobilya:["https://www.w3schools.com/html/movie.mp4"],
    aksesuar:["https://www.w3schools.com/html/movie.mp4"],
    spor:["https://www.w3schools.com/html/movie.mp4"],
    giyim:["https://www.w3schools.com/html/movie.mp4"],
    taki:["https://www.w3schools.com/html/movie.mp4"],
    canta:["https://www.w3schools.com/html/movie.mp4"],
    servis:["https://www.w3schools.com/html/movie.mp4"],
    dekorasyon:["https://www.w3schools.com/html/movie.mp4"],
    tamir:["https://www.w3schools.com/html/movie.mp4"],
    teknik_servis:["https://www.w3schools.com/html/movie.mp4"],
    nakliye:["https://www.w3schools.com/html/movie.mp4"],
    uretim:["https://www.w3schools.com/html/movie.mp4"],
    market:["https://www.w3schools.com/html/movie.mp4"],
    kisisel:["https://www.w3schools.com/html/movie.mp4"]
};

let currentCategory = "trend";
let index = 0;

/* PLAY */
function playSingle(cat,i){
    currentCategory = cat;
    index = i;

    let video = document.getElementById("player");
    let list = ads[cat];

    if(!list || !list[i]) {
        console.log("Video bulunamadı:", cat, i);
        return;
    }

    video.src = list[i];
    video.load();
    video.play();
}

/* WHATSAPP */
function reklamVer(){
    let mesaj = `Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum. Kategori: ${currentCategory}`;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(mesaj));
}
</script>
