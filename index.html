<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>reklam online</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* CATEGORY */
.category{
    margin-top:10px;
}

.category button{
    width:100%;
    padding:12px;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

/* SUBMENU */
.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

/* UPLOAD */
.upload{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px dashed #444;
}

.upload input{
    width:100%;
    color:white;
}

/* ITEMS */
.item{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
}

.item:hover{
    background:green;
}

/* VIDEO */
video{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="title">📺 Reklam Online</div>
    <div class="action" onclick="reklamVer()">📢 WhatsApp</div>
</div>

<div class="container">

<!-- MENU -->
<div class="menu">

<h3>📂 Kategoriler</h3>

<!-- TREND -->
<div class="category">
<button onclick="toggle(this)">🛍 TREND ÜRÜNLER</button>
<div class="submenu">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'trend')">
</div>

<div class="item" onclick="play('trend',0)">🔥 Trend Video 1</div>

</div>
</div>

<!-- ARABA -->
<div class="category">
<button onclick="toggle(this)">🚗 OTOMOBİL</button>
<div class="submenu">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'araba')">
</div>

<div class="item" onclick="play('araba',0)">🚗 Araba Video 1</div>

</div>
</div>

<!-- TEKNOLOJİ -->
<div class="category">
<button onclick="toggle(this)">📱 TEKNOLOJİ</button>
<div class="submenu">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'teknoloji')">
</div>

<div class="item" onclick="play('teknoloji',0)">📱 Teknoloji Video 1</div>

</div>
</div>

<!-- MÜZİK -->
<div class="category">
<button onclick="toggle(this)">🎵 MÜZİK</button>
<div class="submenu">

<div class="upload">
<input type="file" accept="video/*" onchange="upload(event,'muzik')">
</div>

<div class="item" onclick="play('muzik',0)">🎵 Klip 1</div>

</div>
</div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" controls autoplay playsinline></video>
</div>

</div>

<script>

let ads = {
    trend: [],
    araba: [],
    teknoloji: [],
    muzik: []
};

let current = "trend";
let index = 0;

/* MENU AÇ-KAPA */
function toggle(btn){
    let menu = btn.nextElementSibling;
    menu.style.maxHeight = menu.style.maxHeight ? null : menu.scrollHeight + "px";
}

/* VIDEO YÜKLE */
function upload(e,cat){
    let file = e.target.files[0];
    if(!file) return;

    let url = URL.createObjectURL(file);
    ads[cat].push(url);

    current = cat;
    index = ads[cat].length - 1;

    play(cat,index);
}

/* OYNAT */
function play(cat,i){
    current = cat;
    index = i;

    let video = document.getElementById("player");

    if(!ads[cat] || ads[cat].length === 0) return;

    video.src = ads[cat][i];
    video.play();
}

/* WHATSAPP */
function reklamVer(){
    let msg = `Merhaba, reklam vermek istiyorum. Kategori: ${current}`;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(msg));
}

/* TEST VİDEO */
ads.araba.push("BELALI.YARIM.mp4");

</script>

</body>
</html>
