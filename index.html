<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden; /* 🔥 scroll kapalı */
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    display:flex;
    height:100vh;
    position:fixed; /* 🔥 ekran sabit */
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto; /* 🔥 sadece menü scroll */
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
}

button:hover{
    background:red;
}

/* 🔥 DROPDOWN */
.dropdown{
    margin-top:10px;
}

.dropdown-content{
    display:none;
}

.dropdown-content button{
    background:#222;
    font-size:14px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none; /* 🔥 kullanıcı müdahale edemez */
}
</style>
</head>

<body>

<header>📺 DİJİTAL REKLAM TV</header>

<div class="container">

<div class="menu">

    <h3 onclick="toggleMenu()" style="cursor:pointer;">
        📂 Kategoriler (Tıkla Aç/Kapat)
    </h3>

    <div class="dropdown-content" id="menu">

        <button onclick="setCategory('araba')">🚗 Araba</button>
        <button onclick="setCategory('teknoloji')">📱 Teknoloji</button>
        <button onclick="setCategory('trend')">🛍 Trend Ürün</button>
        <button onclick="setCategory('yerel')">🏪 Yerel</button>
        <button onclick="setCategory('muzik')">🎵 Müzik</button>

        <hr>

        <button onclick="setCategory('mobilya')">🪑 Mobilya</button>
        <button onclick="setCategory('aksesuar')">⌚ Aksesuar</button>
        <button onclick="setCategory('giyim')">👕 Giyim & Tekstil</button>
        <button onclick="setCategory('taki')">💍 Takı & Bijuteri</button>
        <button onclick="setCategory('canta')">👜 Çanta</button>
        <button onclick="setCategory('servis')">🛠 Teknik Servis</button>
        <button onclick="setCategory('dekorasyon')">🏠 Dekorasyon</button>
        <button onclick="setCategory('tamir')">🔧 Tamir & Tadilat</button>
        <button onclick="setCategory('nakliye')">🚚 Nakliye</button>
        <button onclick="setCategory('uretim')">🏭 Üretim</button>
        <button onclick="setCategory('market')">🛒 Market</button>
        <button onclick="setCategory('kisisel')">🧑 Kişisel Hizmet</button>

    </div>

    <hr>

    <p style="font-size:12px;">
        Sistem demo versiyonudur. Reklamlar kategoriye göre oynatılır.
    </p>

</div>

<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

function toggleMenu(){
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

let ads = {
    araba:["https://www.w3schools.com/html/mov_bbb.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    trend:[],
    yerel:[],
    muzik:["https://www.w3schools.com/html/movie.mp4"],

    mobilya:[],
    aksesuar:[],
    giyim:[],
    taki:[],
    canta:[],
    servis:[],
    dekorasyon:[],
    tamir:[],
    nakliye:[],
    uretim:[],
    market:[],
    kisisel:[]
};

let currentCategory = "araba";
let index = 0;

function setCategory(cat){
    currentCategory = cat;
    index = 0;
    play();
}

function play(){
    let list = ads[currentCategory];
    let video = document.getElementById("player");

    if(list.length === 0){
        setTimeout(play, 2000);
        return;
    }

    video.src = list[index];
    video.play();

    video.onended = function(){
        index++;
        if(index >= list.length){
            index = 0;
        }
        play();
    }
}

play();

</script>

</body>
</html>
