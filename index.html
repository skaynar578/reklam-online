<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:18px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

/* MENU */
.menu{
    width:25%;
    background:#1a1a1a;
    padding:10px;
    overflow-y:auto;
    box-sizing:border-box;
}

.category{
    border:1px solid #333;
    margin-bottom:10px;
    border-radius:8px;
    overflow:hidden;
}

.category h3{
    margin:0;
    padding:12px;
    background:#222;
    cursor:pointer;
    font-size:14px;
}

.track-list{
    display:none;
    padding:10px;
}

.track{
    padding:8px;
    margin-bottom:6px;
    background:#333;
    cursor:pointer;
    border-radius:5px;
}

.track:hover{
    background:red;
}

/* SCREEN */
.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="topbar">
    <div class="title">📺 DİJİTAL REKLAM TV</div>

    <div class="action" onclick="reklamVer()">
        📢 Reklam Ver / WhatsApp
    </div>
</header>

<div class="container">

<!-- MENU -->
<div class="menu">

<!-- KATEGORİLER -->
<div class="category">
<h3 onclick="toggle('trend')">🛍 Trend Ürünler</h3>
<div class="track-list" id="trend">
<div class="track" onclick="play('Trend Reklam 1','https://www.w3schools.com/html/movie.mp4')">Trend Video 1</div>
</div>
</div>

<div class="category">
<h3 onclick="toggle('araba')">🚗 Otomobil</h3>
<div class="track-list" id="araba">
<div class="track" onclick="play('Araba Reklam','https://www.w3schools.com/html/mov_bbb.mp4')">Araba Tanıtım</div>
</div>
</div>

<div class="category">
<h3 onclick="toggle('teknoloji')">📱 Teknoloji</h3>
<div class="track-list" id="teknoloji">
<div class="track" onclick="play('Telefon Reklam','https://www.w3schools.com/html/movie.mp4')">Telefon Tanıtım</div>
</div>
</div>

<div class="category">
<h3 onclick="toggle('muzik')">🎵 Müzik Tanıtım</h3>
<div class="track-list" id="muzik">
<div class="track" onclick="play('Müzik Klip','https://www.w3schools.com/html/movie.mp4')">Klip İzle</div>
</div>
</div>

<div class="category">
<h3 onclick="toggle('yerel')">🏪 Yerel Firmalar</h3>
<div class="track-list" id="yerel">
<div class="track" onclick="play('Yerel Reklam','https://www.w3schools.com/html/mov_bbb.mp4')">Firma Tanıtım</div>
</div>
</div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

let currentCategory = "";

function reklamVer(){
    let mesaj = `Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;

    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(mesaj), "_blank");
}

/* KATEGORİ AÇ/KAPAT */
function toggle(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
    currentCategory = id;
}

/* VİDEO OYNAT */
function play(name,file){
    let video = document.getElementById("player");
    video.src = file;
    video.play();
}

</script>

</body>
</html>
