/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;

    z-index:9999;

.title{

.action{

    border-radius:6px;
    font-weight:bold;

    cursor:pointer;
}

/* LAYOUT */

    width:100%;
}

.menu{
    width:25%;

    padding:15px;

.screen{

    display:flex;

    justify-content:center;
    background:black;
}

/* KATEGORİ */

}

.category button{

    padding:12px;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.category button:hover{
    background:red;
}

/* ALT KUTULAR */
.submenu{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.submenu div{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.submenu div:hover{
    background:green;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<script>

function toggleMenu(btn){
    let menu = btn.nextElementSibling;

    if(menu.style.maxHeight){
        menu.style.maxHeight = null;
    } else {
        menu.style.maxHeight = menu.scrollHeight + "px";
    }
}

// WHATSAPP
function reklamVer(){
    let mesaj = `Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(mesaj));
}

// ADS
let ads = {
    araba:["https://www.w3schools.com/html/mov_bbb.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    trend:["https://www.w3schools.com/html/movie.mp4"],
    muzik:["https://www.w3schools.com/html/movie.mp4"]
};

let currentCategory = "araba";
let index = 0;

// TEK VİDEO SEÇ
function playSingle(cat,i){
    currentCategory = cat;
    index = i;
    play();
}

// PLAY
function play(){
    let list = ads[currentCategory];
    let video = document.getElementById("player");

    if(!list || list.length === 0) return;

    video.src = list[index];
    video.play();
}

play();

</script>
