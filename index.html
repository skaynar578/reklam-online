<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital Reklam TV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* 🔥 SABİT HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

/* 🔥 TEK BUTON */
.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    border:none;
    background:#333;
    color:white;
    font-size:16px;
    border-radius:6px;
}

button:hover{
    background:red;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

</style>
</head>

<body>

<!-- 🔥 TOP BAR -->
<header class="topbar">

    <div class="title">📺 DİJİTAL REKLAM TV</div>

    <div class="action" onclick="reklamVer()">
        📢 Reklam Ver / WhatsApp
    </div>

</header>

<div class="container">

<div class="menu">

    <h3>📂 Kategoriler</h3>

    <button onclick="setCategory('trend')">🛍 TREND ÜRÜNLER</button>
    <button onclick="setCategory('araba')">🚗 OTOMOBİL</button>
    <button onclick="setCategory('teknoloji')">📱 TEKNOLOJİ ÜRÜNLERİ</button>
    <button onclick="setCategory('yerel')">🏪 YEREL FİRMALAR</button>
    <button onclick="setCategory('muzik')">🎵 MÜZİK</button>

    <hr>

    <button onclick="setCategory('mobilya')">🪑 MOBİLYA</button>
    <button onclick="setCategory('aksesuar')">⌚ EV VE YAŞAM</button>
    <button onclick="setCategory('spor')">⚽ SPOR</button>
    <button onclick="setCategory('giyim')">👕 GİYİM</button>
    <button onclick="setCategory('taki')">💍 TAKI</button>
    <button onclick="setCategory('canta')">👜 ÇANTA</button>
    <button onclick="setCategory('servis')">🛠 TEKNİK SERVİS</button>
    <button onclick="setCategory('dekorasyon')">🏠 DEKORASYON</button>
    <button onclick="setCategory('tamir')">🔧 TAMİR</button>
    <button onclick="setCategory('nakliye')">🚚 NAKLİYE</button>
    <button onclick="setCategory('uretim')">🏭 ÜRETİM</button>
    <button onclick="setCategory('market')">🛒 MARKET</button>
    <button onclick="setCategory('kisisel')">🧑 KİŞİSEL</button>

</div>

<div class="screen">
    <video id="player" autoplay muted></video>
</div>

</div>

<script>

let ads = {
    araba:["https://www.w3schools.com/html/mov_bbb.mp4"],
    teknoloji:["https://www.w3schools.com/html/movie.mp4"],
    trend:[],
    yerel:[],
    muzik:["https://www.w3schools.com/html/movie.mp4"],
    mobilya:[],
    aksesuar:[],
    spor:[],
    giyim:[],
    taki:[],
    canta:[],
    servis:[],
    dekorasyon:[],
    tamir:[],
    nakliye:[],
    uretim:[],
    market:[],
    kisisel:[]
};

let currentCategory = "araba";
let index = 0;

// 📂 KATEGORİ
function setCategory(cat){
    currentCategory = cat;
    index = 0;
    play();
}

// 📲 WHATSAPP
function reklamVer(){

    let mesaj =
`Merhaba, Dijital Reklam TV üzerinden reklam vermek istiyorum.
Kategori: ${currentCategory}`;

    let numara = "905074163605";

    window.open("https://wa.me/" + numara + "?text=" + encodeURIComponent(mesaj), "_blank");
}

// ▶️ OYNAT
function play(){

    let list = ads[currentCategory];
    let video = document.getElementById("player");

    if(list.length === 0){
        setTimeout(play, 2000);
        return;
    }

    video.src = list[index];
    video.play();

    video.onended = function(){
        index++;
        if(index >= list.length){
            index = 0;
        }
        play();
    }
}

play();

</script>

</body>
</html>
