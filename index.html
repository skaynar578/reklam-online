<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>reklam online</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    padding-top:60px;
}

/* HEADER */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    box-sizing:border-box;
    z-index:9999;
}

.title{
    font-size:20px;
    font-weight:bold;
}

.action{
    background:green;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
    position:fixed;
    width:100%;
}

.menu{
    width:25%;
    background:#1a1a1a;
    padding:15px;
    box-sizing:border-box;
    overflow-y:auto;
}

.screen{
    width:75%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:black;
}

/* CATEGORY HEADER */
.category{
    margin-top:10px;
}

.category h3{
    background:#333;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin:0;
}

.category h3:hover{
    background:red;
}

/* TRACK LIST */
.track-list{
    max-height:0;
    overflow:hidden;
    transition:0.3s;
}

.track{
    background:#222;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.track:hover{
    background:green;
}

/* UPLOAD */
.upload{
    background:#111;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px dashed #444;
    font-size:13px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

</style>
</head>

<body>

<header class="topbar">
    <div class="title">📺 reklam online DİJİTAL REKLAM</div>
    <div class="action" onclick="reklamVer()">📢 WhatsApp</div>
</header>

<div class="container">

<!-- MENU -->
<div class="menu">

<h3>📂 Kategoriler</h3>

<!-- HER KATEGORİ AYNI SİSTEM -->
<div class="category">
    <h3 onclick="toggleList('trend')">🛍 TREND ÜRÜNLER</h3>
    <div class="track-list" id="trend">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'trend')">
        </div>
    </div>
</div>

<div class="category">
    <h3 onclick="toggleList('araba')">🚗 OTOMOBİL ALIM-SATIM</h3>
    <div class="track-list" id="araba">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'araba')">
        </div>
    </div>
</div>

<div class="category">
    <h3 onclick="toggleList('teknoloji')">📱 TEKNOLOJİ ÜRÜNLERİ</h3>
    <div class="track-list" id="teknoloji">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'teknoloji')">
        </div>
    </div>
</div>

<div class="category">
    <h3 onclick="toggleList('yerel')">🏪 YEREL FİRMA İLANLARI</h3>
    <div class="track-list" id="yerel">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'yerel')">
        </div>
    </div>
</div>

<div class="category">
    <h3 onclick="toggleList('muzik')">🎵 MÜZİK PİYASASI</h3>
    <div class="track-list" id="muzik">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'muzik')">
        </div>
    </div>
</div>

<div class="category">
    <h3 onclick="toggleList('mobilya')">🪑 MOBİLYA VE AKSESUAR</h3>
    <div class="track-list" id="mobilya">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'mobilya')">
        </div>
    </div>
</div>

<div class="category">
    <h3 onclick="toggleList('spor')">⚽ SPOR</h3>
    <div class="track-list" id="spor">
        <div class="upload">
            <input type="file" accept="video/*" onchange="uploadVideo(event,'spor')">
        </div>
    </div>
</div>

</div>

<!-- SCREEN -->
<div class="screen">
    <video id="player" controls autoplay playsinline></video>
</div>

</div>

<script>

let ads = {
    trend: [],
    araba: [],
    teknoloji: [],
    yerel: [],
    muzik: [],
    mobilya: [],
    spor: []
};

let currentCategory = "trend";
let index = 0;

/* AÇ/KAPAT */
function toggleList(id){
    let el = document.getElementById(id);
    el.style.maxHeight = el.style.maxHeight ? null : el.scrollHeight + "px";
}

/* UPLOAD */
function uploadVideo(event,cat){
    let file = event.target.files[0];
    if(!file) return;

    let url = URL.createObjectURL(file);

    ads[cat].push(url);

    let list = document.getElementById(cat);

    let div = document.createElement("div");
    div.className = "track";
    div.innerText = "▶ Yeni Video";
    div.onclick = () => play(cat, ads[cat].length - 1);

    list.appendChild(div);

    currentCategory = cat;
    index = ads[cat].length - 1;
    play(cat,index);
}

/* OYNAT */
function play(cat,i){
    currentCategory = cat;
    index = i;

    let video = document.getElementById("player");
    let list = ads[cat];

    if(!list || list.length === 0) return;

    video.src = list[i];
    video.play();
}

/* WHATSAPP */
function reklamVer(){
    let mesaj = "Merhaba, reklam vermek istiyorum. Kategori: " + currentCategory;
    window.open("https://wa.me/905074163605?text=" + encodeURIComponent(mesaj));
}

</script>

</body>
</html>
